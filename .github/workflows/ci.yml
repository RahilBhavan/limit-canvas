name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify LOP submodule pinned to 4.3.2
        run: |
          # 4.3.2 tag == commit 67c56aee… ; actions/checkout does not fetch
          # submodule tags, so assert the pinned commit directly.
          expected=67c56aee3b6a9f4982bf487084bd8da1f6638da0
          actual=$(git -C packages/contracts/lib/limit-order-protocol rev-parse HEAD)
          echo "LOP submodule at $actual (expected 4.3.2 = $expected)"
          test "$actual" = "$expected"
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Forge build & test
        working-directory: packages/contracts
        run: |
          forge build
          forge test -vvv
      - name: Gas snapshot check
        working-directory: packages/contracts
        run: |
          forge snapshot --match-path "test/benchmark/*"
          forge snapshot --check --match-path "test/benchmark/*"
      - uses: oven-sh/setup-bun@v2
      - name: Install workspace deps
        run: bun install
      - name: Refresh codegen bytecode-hashes snapshot
        run: bun run snapshot-bytecode
      - name: Verify bytecode-hashes snapshot is in sync
        run: git diff --exit-code packages/codegen/src/bytecode-hashes.json

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Build packages
        run: bun run build:packages
      - name: Typecheck studio
        run: bun run --filter @limit-canvas/studio typecheck
      - name: Test packages
        run: bun run test:packages
      - name: Lint
        run: bun run lint
